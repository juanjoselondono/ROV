joy_node:
  ros__parameters:
    device_id: 0
    deadzone: 0.05
    autorepeat_rate: 20.0

teleop_node:
  ros__parameters:
    axis_linear:
      x: 3
      z: 5
    scale_linear:
      x: 50.
      z: 60.

    axis_angular:
      yaw: 2
      pitch: 1
      roll: 0

    scale_angular:
      yaw: 50.
      pitch: 60.
      roll: 60.
    enable_button: 4
    require_enable_button: true